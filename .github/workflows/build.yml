name: 云源插件自动编译发布

# =============================================================================
# OpenWrt 版本说明
# 当前使用: OpenWrt 24.10.5  |  GCC 13.3.0  |  Linux 6.6.x
#
# 内核版本一致性说明（重要！）
# ─────────────────────────────
# OpenWrt 的软件包分为两类：
#   1. 用户空间包 (luci-app-*, 服务类)   —— 只需架构相同即可安装
#   2. 内核模块 (kmod-*)               —— 必须与目标固件内核版本 **完全一致**
#
# SDK 在构建时已绑定特定的内核版本。用 SDK 24.10.5 编译出的 kmod-* 包，
# 只能安装到同样使用 OpenWrt 24.10.5 固件的路由器上。
# 若固件升级到 24.10.1，kmod 包也必须用 24.10.1 的 SDK 重新编译。
#
# 验证方法（在路由器上执行）：
#   opkg info kernel          # 查看当前固件的内核版本
#   cat /proc/version         # 查看内核版本字符串
#
# 本工作流在每次编译后会自动将内核版本写入 release notes，
# 使用者务必确认路由器固件版本与 Release 说明中的版本一致。
# =============================================================================

on:
  # 手动触发，支持选择单一架构
  workflow_dispatch:
    inputs:
      target:
        description: '编译目标架构 (当前版本始终编译所有架构，此参数仅供记录用途)'
        required: false
        default: ''
      release:
        description: '是否发布 Release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

  # 定时触发：每周一凌晨 2 点（UTC）自动编译
  schedule:
    - cron: '0 2 * * 1'

  # 插件配置或工作流更新时自动触发
  push:
    branches:
      - main
      - master
    paths:
      - 'plugins.conf'
      - 'config/**'
      - 'scripts/hooks/**'
      - '.github/workflows/build.yml'

env:
  # OpenWrt 版本（更新固件版本时同步修改此处）
  OPENWRT_VER: "24.10.5"
  SDK_VER: "24.10"
  # 编译输出根目录
  OUTPUT_ROOT: ${{ github.workspace }}/output

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: 矩阵编译 — 为每个架构并行构建
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: 编译 [${{ matrix.name }}]
    runs-on: ubuntu-22.04

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── x86_64 ─────────────────────────────────────────────────────────
          # 适用设备: PC / 虚拟机 / x86 软路由 (J1900, N100, i226V 等)
          - name: x86_64
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/openwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst

          # ── aarch64_generic ────────────────────────────────────────────────
          # 适用设备: RockChip RK35xx 系列 (NanoPi R5S/R4S/R4SE, FriendlyWRT)
          - name: aarch64_generic
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/rockchip/armv8/openwrt-sdk-24.10.5-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst

          # ── aarch64_cortex-a53 ─────────────────────────────────────────────
          # 适用设备: MediaTek MT7981/MT7986 Filogic (小米 AX3000T, GL-MT6000, BPI-R3, CMCC-RAX3000M)
          - name: aarch64_cortex-a53
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/mediatek/filogic/openwrt-sdk-24.10.5-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst

          # ── aarch64_cortex-a72 ─────────────────────────────────────────────
          # 适用设备: Marvell Armada 8040 / 树莓派 4 (bcm2711 同架构)
          - name: aarch64_cortex-a72
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/mvebu/cortexa72/openwrt-sdk-24.10.5-mvebu-cortexa72_gcc-13.3.0_musl.Linux-x86_64.tar.zst

          # ── arm_cortex-a7_neon-vfpv4 ───────────────────────────────────────
          # 适用设备: Qualcomm IPQ40xx (GL-B1300, Linksys EA6350v3, ZTE MF286D)
          - name: arm_cortex-a7_neon-vfpv4
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/ipq40xx/generic/openwrt-sdk-24.10.5-ipq40xx-generic_gcc-13.3.0_musl_eabi.Linux-x86_64.tar.zst

          # ── arm_cortex-a9_vfpv3-d16 ────────────────────────────────────────
          # 适用设备: Marvell Armada 370/375/385/XP
          - name: arm_cortex-a9_vfpv3-d16
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/mvebu/cortexa9/openwrt-sdk-24.10.5-mvebu-cortexa9_gcc-13.3.0_musl_eabi.Linux-x86_64.tar.zst

          # ── arm_cortex-a15_neon-vfpv4 ──────────────────────────────────────
          # 适用设备: Qualcomm IPQ806x (Netgear R7800, TP-Link C2600, Linksys EA8500)
          - name: arm_cortex-a15_neon-vfpv4
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/ipq806x/generic/openwrt-sdk-24.10.5-ipq806x-generic_gcc-13.3.0_musl_eabi.Linux-x86_64.tar.zst

          # ── mips_24kc ──────────────────────────────────────────────────────
          # 适用设备: Qualcomm/Atheros ath79 (TP-Link WR940N/Archer A7/C7, ASUS RT-AC51U)
          - name: mips_24kc
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/ath79/generic/openwrt-sdk-24.10.5-ath79-generic_gcc-13.3.0_musl.Linux-x86_64.tar.zst

          # ── mipsel_24kc ────────────────────────────────────────────────────
          # 适用设备: MediaTek MT7621 (小米 AC2100/4A-Gigabit, 新路由 Newifi D2, 斐讯 K2P)
          - name: mipsel_24kc
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/ramips/mt7621/openwrt-sdk-24.10.5-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst

          # ── mipsel_74kc ────────────────────────────────────────────────────
          # 适用设备: MediaTek MT7620/Ralink RT3883 系列路由器
          - name: mipsel_74kc
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/ramips/rt3883/openwrt-sdk-24.10.5-ramips-rt3883_gcc-13.3.0_musl.Linux-x86_64.tar.zst

          # ── mipsel_mips32 ──────────────────────────────────────────────────
          # 适用设备: Broadcom BCM47xx MIPS32 (旧款 Linksys/Netgear/ASUS BCM 路由器)
          - name: mipsel_mips32
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/bcm47xx/generic/openwrt-sdk-24.10.5-bcm47xx-generic_gcc-13.3.0_musl.Linux-x86_64.tar.zst

    steps:
      # ── 检出代码 ──────────────────────────────────────────────────────────
      - name: 检出仓库
        uses: actions/checkout@v4

      # ── 释放磁盘空间（编译全量包时需要更多空间）────────────────────────────
      - name: 释放磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
            "${AGENT_TOOLSDIRECTORY}" /usr/local/.ghcup /usr/local/lib/android
          sudo apt-get autoremove -y
          df -h

      # ── 安装系统依赖 ──────────────────────────────────────────────────────
      - name: 安装编译依赖
        run: |
          sudo -E apt-get -y purge azure-cli* docker* ghc* zulu* hhvm* llvm* firefox* google* dotnet* aspnetcore* powershell* openjdk* adoptopenjdk* mysql* php* mongodb* moby* snap* || true
          sudo -E apt-get update
          # 使用 upgrade 而非 full-upgrade：full-upgrade 会尝试升级 snap 包（如 Firefox），
          # 可能因 snapcraft API 网络超时（HTTP 408）导致步骤失败，而 upgrade 已足够。
          sudo -E apt-get -yqq upgrade
          sudo -E apt-get -yqq autoremove --purge
          sudo -E apt-get -yqq autoclean
          sudo -E apt-get -yqq clean
          sudo -E apt-get install -yqq \
            ack antlr3 asciidoc autoconf automake autopoint babeltrace binutils binutils-gold \
            bison build-essential bzip2 ccache clang cmake cpio curl \
            device-tree-compiler dos2unix fastjar flex gawk gettext \
            gcc-multilib g++-multilib git golang gperf haveged help2man intltool \
            jq libc6 libc6-dev-i386 libcrypto++-dev libelf-dev libev-dev \
            libfdt-dev libfuse-dev libglib2.0-dev libgmp3-dev liblua5.1-0 \
            liblzma-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
            libncursesw5-dev libnuma-dev libpam0g-dev libpcre3 libpcre3-dev \
            libperl-dev libpython3-dev libreadline-dev libsnmp-dev libssl-dev \
            libtirpc-dev libtool libtool-bin libtorrent-rasterbar-dev \
            libtext-template-perl libunwind-dev libzstd-dev lrzsz m4 mkisofs \
            msmtp ninja-build p7zip p7zip-full patch perl perl-modules \
            libfile-spec-perl cpanminus pkgconf python3 python3-netifaces \
            python3-pip python3-pyelftools python3-setuptools python3-socks \
            python3-unidecode qemu-utils rsync rustc cargo scons squashfs-tools \
            subversion swig texinfo uglifyjs upx-ucl unzip lib32z1
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"

      # ── 下载并解压 SDK ────────────────────────────────────────────────────
      # 注意: OpenWrt 24.10.x SDK 使用 zstd (.tar.zst) 压缩格式
      - name: 下载并解压 OpenWrt SDK
        run: |
          SDK_FILE=$(basename "${{ matrix.sdk_url }}")
          echo "::group::下载 SDK: $SDK_FILE"
          wget -q --show-progress -O "/tmp/$SDK_FILE" "${{ matrix.sdk_url }}"
          echo "::endgroup::"

          echo "::group::解压 SDK (zstd)"
          mkdir -p /tmp/openwrt-sdk
          tar --zstd -xf "/tmp/$SDK_FILE" -C /tmp/openwrt-sdk --strip-components=1
          rm -f "/tmp/$SDK_FILE"
          echo "::endgroup::"

      # ── 读取内核版本 ──────────────────────────────────────────────────────
      # 内核版本来自 SDK 内置的 include/kernel-version.mk。
      # 用此 SDK 编译的 kmod-* 包只能安装到与此内核版本完全一致的固件上。
      - name: 读取内核版本信息
        id: kernel_ver
        run: |
          KERNEL_VER=$(grep -m1 '^LINUX_VERSION:=' /tmp/openwrt-sdk/include/kernel-version.mk \
            | awk -F':=' '{gsub(/[[:space:]]/, "", $2); print $2}')
          KERNEL_PATCHVER=$(grep -m1 '^LINUX_KERNEL_HASH-' /tmp/openwrt-sdk/include/kernel-version.mk \
            | awk -F'HASH-' '{gsub(/[[:space:]]/, "", $2); print $2}' | awk '{print $1}' || echo "unknown")
          echo "kernel_version=$KERNEL_VER" >> "$GITHUB_OUTPUT"
          echo "kernel_patchver=$KERNEL_PATCHVER" >> "$GITHUB_OUTPUT"
          echo "OpenWrt 版本: ${{ env.OPENWRT_VER }}"
          echo "内核版本: $KERNEL_VER"
          echo "内核 HASH 版本: $KERNEL_PATCHVER"
          echo ""
          echo "⚠️  使用此编译产物的 kmod-* 包时，请确保路由器固件为 OpenWrt ${{ env.OPENWRT_VER }}"
          echo "   可在路由器上执行: opkg info kernel 来确认固件内核版本"

      # ── 克隆插件源码 ──────────────────────────────────────────────────────
      # 支持两种格式（详见 plugins.conf 注释）:
      #   1. 标准格式: <名称> <Git地址> [分支]
      #   2. 集合格式: repo:<名称> <Git地址> [分支] [include=包1,包2] [exclude=包3]
      - name: 克隆插件源码
        id: clone_plugins
        run: |
          mkdir -p /tmp/custom_packages /tmp/plugin_repos
          failed=0
          total=0

          while IFS= read -r line; do
            [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue

            if [[ "$line" =~ ^repo: ]]; then
              # ── 集合仓库格式 ──────────────────────────────────────────────
              rest="${line#repo:}"
              read -ra tokens <<< "$rest"
              name="${tokens[0]:-}"
              url="${tokens[1]:-}"
              [[ -z "$name" || -z "$url" ]] && continue

              branch="" include_list="" exclude_list=""
              for (( idx=2; idx<${#tokens[@]}; idx++ )); do
                token="${tokens[$idx]}"
                case "$token" in
                  include=*) include_list="${token#include=}" ;;
                  exclude=*) exclude_list="${token#exclude=}" ;;
                  *)  [[ -z "$branch" ]] && branch="$token" ;;
                esac
              done
              branch="${branch:-main}"
              total=$((total + 1))

              echo "::group::克隆集合 $name"
              dest="/tmp/plugin_repos/$name"
              if git clone --depth=1 --branch "$branch" "$url" "$dest" 2>/dev/null \
                 || git clone --depth=1 "$url" "$dest"; then
                echo "✅ 集合 $name 克隆成功"

                # 扫描并以符号链接形式导入所有有效的 OpenWrt 包子目录
                pkg_count=0
                while IFS= read -r pkg_dir; do
                  pkg_name=$(basename "$pkg_dir")

                  # include 过滤
                  if [[ -n "$include_list" ]]; then
                    in_list=0
                    IFS=',' read -ra inc_arr <<< "$include_list"
                    for inc in "${inc_arr[@]}"; do
                      [[ "$pkg_name" == "$inc" ]] && { in_list=1; break; }
                    done
                    [[ "$in_list" -eq 0 ]] && continue
                  fi

                  # exclude 过滤
                  if [[ -n "$exclude_list" ]]; then
                    excluded=0
                    IFS=',' read -ra exc_arr <<< "$exclude_list"
                    for exc in "${exc_arr[@]}"; do
                      [[ "$pkg_name" == "$exc" ]] && { excluded=1; break; }
                    done
                    [[ "$excluded" -eq 1 ]] && continue
                  fi

                  if [[ ! -e "/tmp/custom_packages/$pkg_name" ]]; then
                    ln -sf "$pkg_dir" "/tmp/custom_packages/$pkg_name"
                    pkg_count=$((pkg_count + 1))
                  fi
                done < <(find "$dest" -maxdepth 2 -name "Makefile" \
                             ! -path "$dest/Makefile" \
                             -exec grep -ql 'call BuildPackage\|call KernelPackage' {} \; -print \
                             | xargs -I{} dirname {} \
                             | sort -u)

                echo "  → 已导入 $pkg_count 个包"
              else
                echo "⚠️ $name 集合克隆失败（已跳过）"
                failed=$((failed + 1))
              fi
              echo "::endgroup::"
            else
              # ── 标准单体插件格式 ───────────────────────────────────────────
              read -r name url branch <<< "$line"
              [[ -z "$name" || -z "$url" ]] && continue
              branch="${branch:-main}"
              total=$((total + 1))

              echo "::group::克隆 $name"
              if git clone --depth=1 --branch "$branch" "$url" "/tmp/custom_packages/$name" 2>/dev/null \
                 || git clone --depth=1 "$url" "/tmp/custom_packages/$name"; then
                echo "✅ $name 克隆成功"
              else
                echo "⚠️ $name 克隆失败（已跳过）"
                failed=$((failed + 1))
              fi
              echo "::endgroup::"
            fi
          done < plugins.conf

          echo "clone_total=$total" >> "$GITHUB_OUTPUT"
          echo "clone_failed=$failed" >> "$GITHUB_OUTPUT"
          echo "共处理 $total 个插件条目，失败 $failed 个"

      # ── 执行架构自定义 hook 脚本 ─────────────────────────────────────────
      # 若 scripts/hooks/<arch>.sh 存在，则在此执行。
      # 可用于应用补丁、设置架构特定环境变量等操作。
      # 可用变量: $SDK_DIR, $CUSTOM_PKG_DIR, $ARCH
      # 持久化环境变量请写入 $GITHUB_ENV，例如:
      #   echo "MY_VAR=value" >> "$GITHUB_ENV"
      - name: 执行架构自定义脚本
        env:
          SDK_DIR: /tmp/openwrt-sdk
          CUSTOM_PKG_DIR: /tmp/custom_packages
          ARCH: ${{ matrix.name }}
        run: |
          HOOK="$GITHUB_WORKSPACE/scripts/hooks/${{ matrix.name }}.sh"
          if [[ -f "$HOOK" ]]; then
            echo "执行架构自定义脚本: scripts/hooks/${{ matrix.name }}.sh"
            bash "$HOOK"
          else
            echo "未找到自定义脚本 scripts/hooks/${{ matrix.name }}.sh，跳过"
          fi

      # ── 安装 Rust 交叉编译目标 ────────────────────────────────────────────
      # shadowsocks-rust 等包需要对应架构的 musl target。
      # GitHub Actions runner 默认仅含 x86_64-unknown-linux-gnu，
      # 必须显式安装目标架构的 musl target，否则 cargo 交叉编译时
      # 会报 "can't find crate for `core`" 错误。
      #
      # 注意: mips/mipsel musl target 在 rustup 中为 Tier 2，
      # 若下载失败则跳过（该架构的 Rust 包将在编译时通过 IGNORE_ERRORS=m 跳过）。
      - name: 安装 Rust 交叉编译目标
        run: |
          declare -A RUST_TARGET_MAP=(
            ["x86_64"]="x86_64-unknown-linux-musl"
            ["aarch64_generic"]="aarch64-unknown-linux-musl"
            ["aarch64_cortex-a53"]="aarch64-unknown-linux-musl"
            ["aarch64_cortex-a72"]="aarch64-unknown-linux-musl"
            ["arm_cortex-a7_neon-vfpv4"]="armv7-unknown-linux-musleabihf"
            ["arm_cortex-a9_vfpv3-d16"]="armv7-unknown-linux-musleabihf"
            ["arm_cortex-a15_neon-vfpv4"]="armv7-unknown-linux-musleabihf"
            ["mips_24kc"]="mips-unknown-linux-musl"
            ["mipsel_24kc"]="mipsel-unknown-linux-musl"
            ["mipsel_74kc"]="mipsel-unknown-linux-musl"
            ["mipsel_mips32"]="mipsel-unknown-linux-musl"
          )

          ARCH="${{ matrix.name }}"
          RUST_TARGET="${RUST_TARGET_MAP[$ARCH]}"

          if [[ -z "$RUST_TARGET" ]]; then
            echo "⚠️ 未找到架构 $ARCH 对应的 Rust target，跳过"
            exit 0
          fi

          echo "架构: $ARCH → Rust target: $RUST_TARGET"
          if rustup target add "$RUST_TARGET"; then
            echo "✅ Rust target 安装完成: $RUST_TARGET"
          else
            echo "⚠️ Rust target $RUST_TARGET 安装失败（Tier 2 target 可能无预编译包）"
            echo "   该架构的 Rust 相关包将在编译时自动跳过"
          fi

      # ── 配置 feeds ────────────────────────────────────────────────────────
      # 将自定义插件目录作为额外 feed 追加到 SDK 默认配置后
      - name: 配置 feeds
        working-directory: /tmp/openwrt-sdk
        run: |
          echo "src-link custom /tmp/custom_packages" >> feeds.conf.default

          echo "::group::更新 feeds"
          ./scripts/feeds update -a
          echo "::endgroup::"

          echo "::group::安装 feeds"
          ./scripts/feeds install -a
          echo "::endgroup::"

      # ── 生成编译配置 ──────────────────────────────────────────────────────
      # CONFIG_ALL_NONSHARED=y: 编译所有 feeds（官方 + 自定义）中的用户空间包，
      # 使输出可平替官方源，包含所有插件依赖。
      # CONFIG_ALL_KMODS=n: 跳过内核模块（避免跨版本兼容问题）。
      - name: 生成编译配置
        working-directory: /tmp/openwrt-sdk
        run: |
          cat > .config <<'DOTCONFIG'
          CONFIG_ALL_NONSHARED=y
          CONFIG_ALL_KMODS=n
          CONFIG_ALL=n
          CONFIG_AUTOREMOVE=n
          CONFIG_SIGNED_PACKAGES=n
          CONFIG_LUCI_LANG_zh_Hans=y
          DOTCONFIG

          # 显式标记 plugins.conf 中的单体插件，确保其优先被包含
          # repo: 集合仓库行跳过（其包已通过 CONFIG_ALL_NONSHARED=y 全量覆盖）
          while IFS= read -r line; do
            [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
            [[ "$line" =~ ^repo: ]] && continue
            read -r name _ <<< "$line"
            [[ -z "$name" ]] && continue
            echo "CONFIG_PACKAGE_${name}=y"
          done < "$GITHUB_WORKSPACE/plugins.conf" >> .config

          # 物理移除已知在 SDK 环境中无法编译的包。
          # 必须在 make defconfig 之前完成，以确保 kconfig 完全不知道这些包，
          # 从而避免它们出现在编译队列中。
          #
          # 移除逻辑（操作 package/feeds/ 下的已安装 feed 符号链接，而非 feeds/ 原始目录）：
          #
          # ① rust: rust 1.89.0 的 bootstrap 在 CI=true 环境下会因
          #   llvm.download-ci-llvm=true 而 panic。IGNORE_ERRORS=m 无法捕获
          #   HOST 包编译失败（HOST 错误会直接传播到顶层 make 导致整体失败）。
          #   因此必须在 defconfig 前物理移除，确保 rust/host 目标从不存在。
          #
          # ② rust HOST 依赖包（如 shadowsocks-rust）：拥有 HOST_BUILD_DEPENDS:=rust/host
          #   的包会触发 rust HOST 编译，即使 CONFIG_PACKAGE_rust=n 也无法阻止。
          #   通过搜索所有 feed 的 Makefile，自动找出并移除此类包。
          #
          # ③ uboot-fritz4040: 捆绑了 x86 ELF 解释器，在非 x86 SDK 中不存在，
          #   导致 ipq40xx 等架构编译报 "No such file or directory"。
          #   移除其 feeds/ 原始目录（feeds/base 为 SDK 基础 feed 的符号树）。
          echo "::group::移除 CI 环境中无法编译的包"
          # ① rust 包本体（package/feeds/packages/rust 是 feeds install 创建的符号链接）
          rm -rf package/feeds/packages/rust 2>/dev/null || true
          # ② 搜索所有 feed 中依赖 rust/host 的包并移除
          # 使用进程替换避免 grep 无匹配时 set -e 导致脚本中止
          while IFS= read -r makefile; do
            echo "  移除 rust HOST 依赖包: $(dirname "$makefile")"
            rm -rf "$(dirname "$makefile")"
          done < <(grep -rl 'HOST_BUILD_DEPENDS.*rust' package/feeds/ --include='Makefile' 2>/dev/null || true)
          # ③ uboot-fritz4040（移除原始 feed 目录；defconfig 前执行使 kconfig 感知不到）
          rm -rf feeds/base/package/boot/uboot-fritz4040 2>/dev/null || true
          echo "::endgroup::"

          make defconfig

          # ⚠️ defconfig 之后的补充禁用（belt-and-suspenders）。
          # 上方已在 defconfig 前物理移除了 rust 及其 HOST 依赖包，
          # 此处作为额外保险：若任何 rust 相关符号仍出现在 .config 中，
          # 通过追加 "# ... is not set" 并删除 =y 行确保其被禁用。
          # uboot-fritz4040 同理（含所有子变体如 uboot-fritz4040-fritz1200）。
          for pkg in rust shadowsocks-rust uboot-fritz4040; do
            grep "^CONFIG_PACKAGE_${pkg}" .config \
              | sed 's/=.*//' \
              | sed 's/^/# /' \
              | sed 's/$/ is not set/' >> .config || true
            sed -i "/^CONFIG_PACKAGE_${pkg}/d" .config
          done

      # ── 执行编译 ──────────────────────────────────────────────────────────
      # 优先并行编译；若失败则自动降级为单线程重试（排查具体错误）。
      # 使用 PIPESTATUS[0] 获取 make 的真实退出码，避免 tee 掩盖编译失败。
      # IGNORE_ERRORS=m: 跳过单个包级编译失败，确保其余包能继续编译。
      #   （注意: =1 无法阻止包编译错误向上传播，必须使用 =m）
      - name: 编译插件包
        working-directory: /tmp/openwrt-sdk
        run: |
          echo "::group::并行编译 ($(nproc) 线程)"
          set +e; make package/compile IGNORE_ERRORS=m -j"$(nproc)" V=s 2>&1 | tee /tmp/build.log; BUILD_RC=${PIPESTATUS[0]}; set -e
          echo "::endgroup::"
          if [ "$BUILD_RC" -eq 0 ]; then
            echo "✅ 并行编译成功"
          else
            echo "⚠️ 并行编译失败，降级为单线程重试..."
            echo "::group::单线程重试"
            set +e; make package/compile IGNORE_ERRORS=m -j1 V=s 2>&1 | tee /tmp/build.log; BUILD_RC=${PIPESTATUS[0]}; set -e
            echo "::endgroup::"
            [ "$BUILD_RC" -eq 0 ] || { echo "❌ 单线程编译失败 (exit=$BUILD_RC)，请检查上方日志"; exit $BUILD_RC; }
          fi

      # ── 收集 ipk 包 ───────────────────────────────────────────────────────
      - name: 收集编译产物
        run: |
          PKG_DIR="${OUTPUT_ROOT}/${{ matrix.name }}/packages"
          mkdir -p "$PKG_DIR"
          find /tmp/openwrt-sdk/bin/packages -name "*.ipk" \
              -exec cp -v {} "$PKG_DIR/" \;
          count=$(find "$PKG_DIR" -name "*.ipk" | wc -l)
          echo "收集 ipk 数量: $count"
          echo "pkg_count=$count" >> "$GITHUB_ENV"

      # ── 生成 opkg 包索引 ──────────────────────────────────────────────────
      # 生成 Packages + Packages.gz，使该目录可直接作为 opkg 源使用
      - name: 生成 opkg 包索引
        run: |
          PKG_DIR="${OUTPUT_ROOT}/${{ matrix.name }}/packages"
          : > "$PKG_DIR/Packages"
          for ipk in "$PKG_DIR"/*.ipk; do
            [[ -f "$ipk" ]] || continue
            pkg_name=$(basename "$ipk" .ipk | sed 's/_[^_]*_[^_]*$//')
            pkg_size=$(wc -c < "$ipk")
            pkg_sha256=$(sha256sum "$ipk" | awk '{print $1}')
            printf "Package: %s\nFilename: %s\nSize: %s\nSHA256sum: %s\n\n" \
              "$pkg_name" "$(basename "$ipk")" "$pkg_size" "$pkg_sha256" \
              >> "$PKG_DIR/Packages"
          done
          gzip -9 -k "$PKG_DIR/Packages"
          echo "包索引生成完成"

      # ── 打包云源归档 ──────────────────────────────────────────────────────
      # 归档命名格式: mzwrt-yun-plugins-<arch>-<openwrt_ver>-<date>-<sha>.tar.gz
      # 其中 openwrt_ver 即为内核版本基准，方便用户核对固件版本
      - name: 打包云源归档
        id: package
        run: |
          LINUX_VER="${{ steps.kernel_ver.outputs.kernel_version }}"
          GIT_SHA=$(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD 2>/dev/null || echo 'local')
          DATE=$(date +'%Y%m%d')
          VERSION="${{ env.OPENWRT_VER }}-${DATE}-${GIT_SHA}"

          TARBALL="${OUTPUT_ROOT}/mzwrt-yun-plugins-${{ matrix.name }}-${VERSION}.tar.gz"
          tar -czf "$TARBALL" -C "${OUTPUT_ROOT}" "${{ matrix.name }}/"
          sha256sum "$TARBALL" > "${TARBALL}.sha256"

          {
            echo "tarball=$TARBALL"
            echo "tarball_name=$(basename "$TARBALL")"
            echo "version=$VERSION"
            echo "linux_ver=$LINUX_VER"
          } >> "$GITHUB_OUTPUT"
          echo "云源包: $(basename "$TARBALL")  大小: $(du -sh "$TARBALL" | cut -f1)"
          echo "绑定内核版本: $LINUX_VER (仅适用于 OpenWrt ${{ env.OPENWRT_VER }} 固件)"

      # ── 上传构建产物 ──────────────────────────────────────────────────────
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: plugins-${{ matrix.name }}
          path: |
            ${{ env.OUTPUT_ROOT }}/mzwrt-yun-plugins-${{ matrix.name }}-*.tar.gz
            ${{ env.OUTPUT_ROOT }}/mzwrt-yun-plugins-${{ matrix.name }}-*.tar.gz.sha256
          retention-days: 7

      # ── 上传编译日志（仅失败时）──────────────────────────────────────────
      - name: 上传编译日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.name }}
          path: /tmp/build.log
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: 发布 GitHub Release
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: 发布云源 Release
    needs: build
    runs-on: ubuntu-22.04
    if: >
      always() &&
      needs.build.result != 'cancelled' &&
      (
        github.event_name == 'schedule' ||
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true')
      )

    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: plugins-*
          path: /tmp/artifacts
          merge-multiple: true

      - name: 生成发布说明
        id: release_notes
        run: |
          VERSION="$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          OPENWRT_VER="${{ env.OPENWRT_VER }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          PKG_LIST=""
          for f in /tmp/artifacts/*.tar.gz; do
            [[ -f "$f" ]] || continue
            name=$(basename "$f")
            size=$(du -sh "$f" | cut -f1)
            PKG_LIST="${PKG_LIST:+${PKG_LIST}\n}- \`${name}\` (${size})"
          done

          cat > /tmp/release_notes.md <<EOF
          ## 云源插件发布 v${VERSION}

          **OpenWrt 版本**: \`${OPENWRT_VER}\`  
          **编译时间**: $(date +'%Y-%m-%d %H:%M:%S UTC')  
          **触发事件**: ${{ github.event_name }}

          ---

          ### ⚠️ 内核版本一致性说明

          > 使用本次编译产物前，**必须**确认路由器固件版本与 OpenWrt 版本匹配：
          >
          > **本次编译使用 OpenWrt ${OPENWRT_VER} SDK**，所有 \`kmod-*\` 内核模块包只能安装在  
          > 运行 **OpenWrt ${OPENWRT_VER}** 固件的设备上，在其他版本固件上会出现内核哈希不匹配错误。
          >
          > **验证方法（在路由器上执行）：**
          > \`\`\`bash
          > opkg info kernel         # 输出中包含 Version 字段即为当前固件版本
          > cat /proc/version        # 查看完整内核版本字符串
          > \`\`\`
          >
          > 若版本不匹配，请先将固件升级/降级至 \`${OPENWRT_VER}\`，或等待本仓库发布对应版本的编译包。

          ---

          ### 安装方法

          **方式一：直接安装 ipk（推荐）**

          解压 \`.tar.gz\` 包后，将 \`.ipk\` 文件复制到路由器并执行：
          \`\`\`bash
          opkg install /tmp/luci-app-xxx_*.ipk
          \`\`\`

          **方式二：作为 opkg 自定义源**

          将压缩包解压到可通过 HTTP 访问的目录，然后在路由器上执行：
          \`\`\`bash
          echo "src/gz mzwrt-yun http://<your-server>/<arch>/packages" >> /etc/opkg/customfeeds.conf
          opkg update && opkg install <插件名>
          \`\`\`

          ---

          ### 编译产物列表

          $(echo -e "${PKG_LIST}")

          ---

          ### 支持架构说明

          | 架构 | 目标平台 | 典型设备 |
          |------|---------|---------|
          | \`x86_64\` | x86/64 | PC / 虚拟机 / N100 软路由 |
          | \`aarch64_generic\` | rockchip/armv8 | NanoPi R5S/R4S/R4SE |
          | \`aarch64_cortex-a53\` | mediatek/filogic | 小米 AX3000T, GL-MT6000, BPI-R3 |
          | \`aarch64_cortex-a72\` | mvebu/cortexa72 | 树莓派 4 (同架构) |
          | \`arm_cortex-a7_neon-vfpv4\` | ipq40xx/generic | GL-B1300, Linksys EA6350v3 |
          | \`arm_cortex-a9_vfpv3-d16\` | mvebu/cortexa9 | Marvell Armada 370/XP |
          | \`arm_cortex-a15_neon-vfpv4\` | ipq806x/generic | Netgear R7800, TP-Link C2600 |
          | \`mips_24kc\` | ath79/generic | TP-Link WR940N, Archer A7/C7 |
          | \`mipsel_24kc\` | ramips/mt7621 | 小米 AC2100, 新路由 Newifi D2 |
          | \`mipsel_74kc\` | ramips/rt3883 | MediaTek MT7620 系列 |
          | \`mipsel_mips32\` | bcm47xx/generic | Broadcom BCM47xx 路由器 |

          > 各架构的 SHA256 校验文件随包一同发布。
          EOF

          echo "release_notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release_notes.outputs.version }}
          name: 云源插件 v${{ steps.release_notes.outputs.version }} (OpenWrt ${{ env.OPENWRT_VER }})
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false
          files: |
            /tmp/artifacts/*.tar.gz
            /tmp/artifacts/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
