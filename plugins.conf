luci-app-qbittorrent  https://github.com/kenzok8/small-package                 main

# ── 插件集合仓库示例（取消注释以启用）─────────────────────────────────────────
# 导入整个 kenzok8/small-package 集合（含所有插件）:
#   repo:kenzok8-small  https://github.com/kenzok8/small-package  main

repo:mzwrt-package https://github.com/mzwrt/package-lite.git  main

#
# 只从 Lienol/openwrt-package 导入指定插件:
#   repo:lienol-pkg     https://github.com/Lienol/openwrt-package  main  include=luci-app-ssr-musl-full,luci-theme-argon
#
# 导入 kiddin9/openwrt-packages 集合并排除 Rust 相关包（避免 CI 编译失败）:
#   repo:kiddin9-pkgs   https://github.com/kiddin9/openwrt-packages  main  exclude=shadowsocks-rust,naiveproxy
