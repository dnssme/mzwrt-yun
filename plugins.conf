# 云源插件仓库配置文件
# ─────────────────────────────────────────────────────────────────────────────
# 支持两种格式:
#
# 【标准格式】单体插件仓库（每行对应一个独立插件仓库）:
#   <仓库名称> <Git仓库地址> [分支]
#   示例:
#     luci-app-openclash  https://github.com/vernesong/OpenClash  master
#
# 【集合格式】插件集合仓库（一个仓库内包含多个插件子目录）:
#   repo:<仓库名称> <Git仓库地址> [分支] [include=包1,包2,...] [exclude=包3,...]
#   说明:
#     - 自动扫描并导入仓库中所有含 Makefile 的子目录作为独立 OpenWrt 包
#     - include= 可选，指定后只导入列表内的包（逗号分隔，不含空格）
#     - exclude= 可选，跳过列表内的包（逗号分隔，不含空格）
#   示例:
#     repo:small-package  https://github.com/kenzok8/small-package   main
#     repo:lienol-pkg     https://github.com/Lienol/openwrt-package  main  include=luci-app-ssr-musl-full,luci-theme-argon
#     repo:kiddin9-pkgs   https://github.com/kiddin9/openwrt-packages main  exclude=shadowsocks-rust
#
# 每行一个条目，以 # 开头的行为注释，空行忽略。
# ─────────────────────────────────────────────────────────────────────────────

# ── 常用工具类 ────────────────────────────────────────────────────────────────
luci-app-openclash    https://github.com/vernesong/OpenClash                   master
